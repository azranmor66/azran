<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פוסט | פורום עזרן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e61e2a;
  --bg: #080808;
  --surface: #111;
  --surface2: #181818;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: #888;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Heebo',sans-serif; min-height:100vh; }

nav {
  position:fixed; top:0; width:100%; background:rgba(8,8,8,0.9);
  backdrop-filter:blur(20px); border-bottom:1px solid var(--border);
  padding:0 5%; height:60px; display:flex; align-items:center; justify-content:space-between; z-index:100;
}
.nav-brand { font-size:1.2rem; font-weight:900; color:#fff; text-decoration:none; letter-spacing:1px; }
.nav-brand span { color:var(--red); }
.nav-right { display:flex; align-items:center; gap:16px; }
#auth-btn { background:var(--red); color:#fff; border:none; padding:8px 18px; border-radius:8px; font-family:'Heebo',sans-serif; font-weight:800; font-size:0.85rem; cursor:pointer; }
#auth-btn:hover { background:#c91020; }
#user-info { display:flex; align-items:center; gap:10px; font-size:0.85rem; }
#user-info span { color:var(--muted); }
#logout-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.82rem; cursor:pointer; }
#logout-btn:hover { border-color:var(--red); color:var(--red); }

.page { max-width:760px; margin:0 auto; padding:80px 5% 80px; }
.back-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); text-decoration:none; font-size:0.85rem; font-weight:600; margin-bottom:28px; transition:color 0.2s; }
.back-link:hover { color:#fff; }

/* POST */
.post-wrap { background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; margin-bottom:28px; }
.post-main { display:flex; gap:0; }
.vote-col {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:20px 14px; background:var(--surface2); min-width:56px;
}
.vote-col button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.2rem; line-height:1; padding:4px; transition:color 0.2s; }
.vote-col button:hover { color:#fff; }
.vote-col button.up.active { color:var(--red); }
.vote-col button.down.active { color:#5b8dd9; }
.vote-count { font-size:1rem; font-weight:900; color:#fff; }
.post-content { padding:24px 24px 20px; flex:1; }
.post-top-meta { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.post-cat { background:rgba(230,30,42,0.12); color:var(--red); border:1px solid rgba(230,30,42,0.2); font-size:0.7rem; font-weight:800; letter-spacing:0.08em; padding:3px 12px; border-radius:999px; }
.post-author { font-size:0.82rem; color:var(--muted); }
.post-time { font-size:0.78rem; color:#555; }
.post-title-full { font-size:1.5rem; font-weight:900; line-height:1.3; margin-bottom:16px; }
.post-body-text { font-size:0.95rem; color:#ccc; line-height:1.8; white-space:pre-wrap; }
.post-actions { padding:14px 24px; border-top:1px solid var(--border); display:flex; align-items:center; gap:16px; }
.action-btn { background:none; border:none; color:var(--muted); font-family:'Heebo',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:5px; transition:color 0.2s; }
.action-btn:hover { color:var(--red); }
.action-btn.delete:hover { color:#ff5555; }

/* COMMENTS */
.comments-header { font-size:1rem; font-weight:800; color:var(--muted); margin-bottom:16px; }
.comments-header span { color:#fff; }

.comment-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; }
.comment-meta { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.comment-author { font-size:0.82rem; font-weight:800; color:var(--red); }
.comment-time { font-size:0.75rem; color:#555; }
.comment-text { font-size:0.92rem; color:#ddd; line-height:1.7; white-space:pre-wrap; }
.comment-vote-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
.comment-vote-row button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:2px 4px; transition:color 0.2s; }
.comment-vote-row button:hover { color:#fff; }
.comment-vote-row button.up.active { color:var(--red); }
.comment-vote-row button.down.active { color:#5b8dd9; }
.comment-vote-count { font-size:0.82rem; font-weight:800; color:#fff; min-width:20px; text-align:center; }
.del-comment { margin-right:auto; background:none; border:none; color:#555; font-family:'Heebo',sans-serif; font-size:0.75rem; cursor:pointer; transition:color 0.2s; }
.del-comment:hover { color:#ff5555; }

/* REPLY BOX */
.reply-section { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; }
.reply-section h3 { font-size:0.95rem; font-weight:800; margin-bottom:14px; color:var(--muted); }
.reply-section h3 span { color:#fff; }
.reply-section textarea {
  width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
  color:#fff; font-family:'Heebo',sans-serif; font-size:0.92rem; padding:12px 14px;
  outline:none; resize:vertical; min-height:90px; transition:border-color 0.2s;
}
.reply-section textarea:focus { border-color:var(--red); }
.reply-section button {
  margin-top:10px; background:var(--red); color:#fff; border:none; padding:10px 24px;
  border-radius:10px; font-family:'Heebo',sans-serif; font-weight:800; font-size:0.9rem; cursor:pointer; transition:background 0.2s;
}
.reply-section button:hover { background:#c91020; }
.reply-section button:disabled { opacity:0.5; cursor:not-allowed; }
.login-prompt { color:var(--muted); font-size:0.88rem; text-align:center; padding:16px; }
.login-prompt button { background:none; border:none; color:var(--red); font-family:'Heebo',sans-serif; font-weight:800; cursor:pointer; font-size:0.88rem; }

/* SKELETON */
.skel { background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:14px; }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

/* AUTH MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.hidden { display:none; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px; width:100%; max-width:420px; }
.modal h2 { font-size:1.3rem; font-weight:900; margin-bottom:20px; }
.modal h2 span { color:var(--red); }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:0.8rem; font-weight:700; color:var(--muted); margin-bottom:5px; }
.form-group input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:#fff; font-family:'Heebo',sans-serif; font-size:0.92rem; padding:10px 14px; outline:none; transition:border-color 0.2s; }
.form-group input:focus { border-color:var(--red); }
.modal-btns { display:flex; gap:10px; margin-top:16px; }
.btn-submit { flex:1; background:var(--red); color:#fff; border:none; padding:11px; border-radius:10px; font-family:'Heebo',sans-serif; font-weight:800; font-size:0.92rem; cursor:pointer; }
.btn-submit:disabled { opacity:0.5; }
.btn-cancel { background:none; border:1px solid var(--border); color:var(--muted); padding:11px 18px; border-radius:10px; font-family:'Heebo',sans-serif; font-weight:700; font-size:0.92rem; cursor:pointer; }
.auth-toggle { text-align:center; margin-top:14px; font-size:0.82rem; color:var(--muted); }
.auth-toggle button { background:none; border:none; color:var(--red); font-family:'Heebo',sans-serif; font-weight:700; cursor:pointer; }
.error-msg { background:rgba(230,30,42,0.1); border:1px solid rgba(230,30,42,0.3); color:#ff8888; font-size:0.8rem; padding:9px 12px; border-radius:8px; margin-bottom:12px; display:none; }
.error-msg.show { display:block; }

@media(max-width:600px) {
  .page { padding:72px 4% 60px; }
  .post-title-full { font-size:1.2rem; }
  .post-content { padding:18px 16px; }
}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:16px;">
    <a href="home.html" class="nav-brand">AZRAN<span>.</span>CC</a>
  </div>
  <div class="nav-right">
    <div id="user-info" style="display:none;">
      <span id="username-display"></span>
      <button id="logout-btn" onclick="logout()">יציאה</button>
    </div>
    <button id="auth-btn" onclick="openAuth()">התחבר / הרשם</button>
  </div>
</nav>

<div class="page">
  <a href="forum.html" class="back-link">← חזרה לפורום</a>
  <div id="post-container"><div class="skel" style="height:220px;margin-bottom:16px;"></div></div>
  <div id="comments-section"></div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay hidden" id="auth-modal">
  <div class="modal">
    <h2 id="auth-title">התחבר ל<span>פורום</span></h2>
    <div class="error-msg" id="auth-error"></div>
    <div class="form-group"><label>אימייל</label><input type="email" id="auth-email" placeholder="your@email.com" dir="ltr"></div>
    <div class="form-group"><label>סיסמה</label><input type="password" id="auth-password" placeholder="••••••••" dir="ltr"></div>
    <div class="modal-btns">
      <button class="btn-submit" id="auth-submit-btn" onclick="submitAuth()">התחבר</button>
      <button class="btn-cancel" onclick="closeAuth()">ביטול</button>
    </div>
    <div class="auth-toggle">אין לך חשבון? <button onclick="toggleAuthMode()">הרשם כאן</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://ujpjgdtscgukldbtyadi.supabase.co';
const SUPA_KEY = 'sb_publishable_56RVvOjXom3wW5OFZj6Qyw_r41lz2ux';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const postId = new URLSearchParams(location.search).get('id');
let currentUser = null;
let authMode = 'login';

function timeAgo(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 60) return 'עכשיו';
  if (diff < 3600) return `לפני ${Math.floor(diff/60)} דק׳`;
  if (diff < 86400) return `לפני ${Math.floor(diff/3600)} שע׳`;
  return `לפני ${Math.floor(diff/86400)} ימים`;
}

sb.auth.onAuthStateChange(async (event, session) => {
  currentUser = session?.user || null;
  if (currentUser) {
    const { data: profile } = await sb.from('profiles').select('username').eq('id', currentUser.id).single();
    document.getElementById('username-display').textContent = profile?.username || currentUser.email;
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('auth-btn').style.display = 'none';
  } else {
    document.getElementById('user-info').style.display = 'none';
    document.getElementById('auth-btn').style.display = 'block';
  }
  renderReplyBox();
});

async function loadPost() {
  if (!postId) { document.getElementById('post-container').innerHTML = '<p style="color:var(--muted)">פוסט לא נמצא</p>'; return; }
  const { data: post } = await sb.from('posts').select('*, profiles(username)').eq('id', postId).single();
  if (!post) { document.getElementById('post-container').innerHTML = '<p style="color:var(--muted)">פוסט לא נמצא</p>'; return; }
  document.title = `${post.title} | פורום עזרן`;

  let userVote = 0;
  if (currentUser) {
    const { data: v } = await sb.from('post_votes').select('value').eq('user_id', currentUser.id).eq('post_id', postId).single();
    userVote = v?.value || 0;
  }

  const canDelete = currentUser?.id === post.author_id;
  document.getElementById('post-container').innerHTML = `
    <div class="post-wrap">
      <div class="post-main">
        <div class="vote-col">
          <button class="up ${userVote===1?'active':''}" onclick="votePost(1)" title="חיובי">▲</button>
          <span class="vote-count" id="post-vote-count">${post.votes_count||0}</span>
          <button class="down ${userVote===-1?'active':''}" onclick="votePost(-1)" title="שלילי">▼</button>
        </div>
        <div class="post-content">
          <div class="post-top-meta">
            <span class="post-cat">${post.category}</span>
            <span class="post-author">@${post.profiles?.username||'אנונימי'}</span>
            <span class="post-time">${timeAgo(post.created_at)}</span>
          </div>
          <h1 class="post-title-full">${post.title}</h1>
          <div class="post-body-text">${post.content}</div>
        </div>
      </div>
      ${canDelete ? `<div class="post-actions"><button class="action-btn delete" onclick="deletePost()">🗑️ מחק פוסט</button></div>` : ''}
    </div>`;
  loadComments();
}

async function votePost(value) {
  if (!currentUser) { openAuth(); return; }
  const { data: existing } = await sb.from('post_votes').select('value').eq('user_id', currentUser.id).eq('post_id', postId).single();
  const countEl = document.getElementById('post-vote-count');
  let current = parseInt(countEl.textContent);
  if (existing) {
    if (existing.value === value) {
      await sb.from('post_votes').delete().eq('user_id', currentUser.id).eq('post_id', postId);
      current -= value;
    } else {
      await sb.from('post_votes').update({ value }).eq('user_id', currentUser.id).eq('post_id', postId);
      current += value * 2;
    }
  } else {
    await sb.from('post_votes').insert({ user_id: currentUser.id, post_id: postId, value });
    current += value;
  }
  await sb.from('posts').update({ votes_count: current }).eq('id', postId);
  loadPost();
}

async function deletePost() {
  if (!confirm('למחוק את הפוסט?')) return;
  await sb.from('posts').delete().eq('id', postId);
  window.location.href = 'forum.html';
}

async function loadComments() {
  const { data: comments } = await sb.from('comments').select('*, profiles(username)').eq('post_id', postId).order('created_at', { ascending: true });
  let userVotes = {};
  if (currentUser) {
    const ids = comments?.map(c => c.id) || [];
    if (ids.length) {
      const { data: votes } = await sb.from('comment_votes').select('comment_id,value').eq('user_id', currentUser.id).in('comment_id', ids);
      votes?.forEach(v => userVotes[v.comment_id] = v.value);
    }
  }

  const sec = document.getElementById('comments-section');
  const list = comments?.length ? comments.map(c => `
    <div class="comment-box" id="c-${c.id}">
      <div class="comment-meta">
        <span class="comment-author">@${c.profiles?.username||'אנונימי'}</span>
        <span class="comment-time">${timeAgo(c.created_at)}</span>
      </div>
      <div class="comment-text">${c.content}</div>
      <div class="comment-vote-row">
        <button class="up ${userVotes[c.id]===1?'active':''}" onclick="voteComment('${c.id}',1)">▲</button>
        <span class="comment-vote-count">${c.votes_count||0}</span>
        <button class="down ${userVotes[c.id]===-1?'active':''}" onclick="voteComment('${c.id}',-1)">▼</button>
        ${currentUser?.id === c.author_id ? `<button class="del-comment" onclick="deleteComment('${c.id}')">מחק</button>` : ''}
      </div>
    </div>`).join('') : '<p style="color:var(--muted);font-size:0.88rem;margin-bottom:16px;">אין תגובות עדיין — היה הראשון!</p>';

  sec.innerHTML = `
    <div class="comments-header"><span>${comments?.length||0}</span> תגובות</div>
    ${list}
    <div id="reply-box"></div>`;
  renderReplyBox();
}

function renderReplyBox() {
  const el = document.getElementById('reply-box');
  if (!el) return;
  if (currentUser) {
    el.innerHTML = `
      <div class="reply-section">
        <h3>הוסף <span>תגובה</span></h3>
        <textarea id="comment-text" placeholder="מה דעתך?"></textarea>
        <button onclick="submitComment()">שלח תגובה</button>
      </div>`;
  } else {
    el.innerHTML = `<div class="login-prompt">כדי להגיב <button onclick="openAuth()">התחבר / הרשם</button></div>`;
  }
}

async function submitComment() {
  const text = document.getElementById('comment-text').value.trim();
  if (!text) return;
  const btn = document.querySelector('.reply-section button');
  btn.disabled = true; btn.textContent = '...';
  const { error } = await sb.from('comments').insert({ post_id: postId, author_id: currentUser.id, content: text });
  if (!error) {
    const { data: post } = await sb.from('posts').select('comments_count').eq('id', postId).single();
    await sb.from('posts').update({ comments_count: (post?.comments_count||0)+1 }).eq('id', postId);
    loadComments();
  }
  btn.disabled = false; btn.textContent = 'שלח תגובה';
}

async function voteComment(commentId, value) {
  if (!currentUser) { openAuth(); return; }
  const { data: existing } = await sb.from('comment_votes').select('value').eq('user_id', currentUser.id).eq('comment_id', commentId).single();
  const { data: comment } = await sb.from('comments').select('votes_count').eq('id', commentId).single();
  let count = comment?.votes_count || 0;
  if (existing) {
    if (existing.value === value) {
      await sb.from('comment_votes').delete().eq('user_id', currentUser.id).eq('comment_id', commentId);
      count -= value;
    } else {
      await sb.from('comment_votes').update({ value }).eq('user_id', currentUser.id).eq('comment_id', commentId);
      count += value * 2;
    }
  } else {
    await sb.from('comment_votes').insert({ user_id: currentUser.id, comment_id: commentId, value });
    count += value;
  }
  await sb.from('comments').update({ votes_count: count }).eq('id', commentId);
  loadComments();
}

async function deleteComment(commentId) {
  if (!confirm('למחוק את התגובה?')) return;
  await sb.from('comments').delete().eq('id', commentId);
  const { data: post } = await sb.from('posts').select('comments_count').eq('id', postId).single();
  await sb.from('posts').update({ comments_count: Math.max(0,(post?.comments_count||1)-1) }).eq('id', postId);
  loadComments();
}

// AUTH
function openAuth() { document.getElementById('auth-modal').classList.remove('hidden'); }
function closeAuth() {
  document.getElementById('auth-modal').classList.add('hidden');
  document.getElementById('auth-error').classList.remove('show');
}
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-title').innerHTML = authMode==='login' ? 'התחבר ל<span>פורום</span>' : 'הצטרף ל<span>פורום</span>';
  document.getElementById('auth-submit-btn').textContent = authMode==='login' ? 'התחבר' : 'הרשם';
  document.querySelector('.auth-toggle').innerHTML = authMode==='login'
    ? 'אין לך חשבון? <button onclick="toggleAuthMode()">הרשם כאן</button>'
    : 'יש לך חשבון? <button onclick="toggleAuthMode()">התחבר</button>';
}
async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-submit-btn');
  const errEl = document.getElementById('auth-error');
  if (!email || !password) return;
  btn.disabled = true; btn.textContent = '...';
  let err;
  if (authMode === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password }); err = error;
  } else {
    const { error } = await sb.auth.signUp({ email, password }); err = error;
    if (!err) {
      errEl.style.cssText = 'background:rgba(30,180,30,0.1);border-color:rgba(30,180,30,0.3);color:#5dca5d;display:block;';
      errEl.textContent = 'נשלח מייל אימות!';
      btn.disabled = false; btn.textContent = 'הרשם'; return;
    }
  }
  if (err) { errEl.textContent = err.message.includes('Invalid') ? 'אימייל או סיסמה שגויים' : err.message; errEl.classList.add('show'); }
  else closeAuth();
  btn.disabled = false; btn.textContent = authMode==='login' ? 'התחבר' : 'הרשם';
}
async function logout() { await sb.auth.signOut(); }

document.addEventListener('keydown', e => { if (e.key==='Escape') closeAuth(); });
document.getElementById('auth-modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeAuth(); });

loadPost();
</script>
</body>
</html>
