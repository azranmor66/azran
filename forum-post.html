<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פוסט | פורום הפועל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef0f5;--surface:#fff;--surface2:#f7f7fa;--red:#c8101e;--red-dark:#8b0000;--red-mid:#a01018;--red-faint:rgba(200,16,30,0.06);--border:#dde0ea;--text:#1a1a2a;--muted:#66677a;--link:#c8101e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);min-height:100vh;}
/* header */
#header{background:linear-gradient(180deg,var(--red) 0%,var(--red-dark) 100%);border-bottom:3px solid #ff2233;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,0.15);}
.logo{display:flex;align-items:center;gap:12px;}
.logo-circle{width:44px;height:44px;background:radial-gradient(circle,#fff 30%,#f0e0e0);border-radius:50%;border:2px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:var(--red);flex-shrink:0;}
.logo-text h1{font-size:1.2rem;font-weight:900;color:#fff;}
.header-right{display:flex;align-items:center;gap:10px;font-size:0.8rem;}
.header-right a,.header-right button{color:rgba(255,255,255,0.85);text-decoration:none;background:none;border:none;font-family:'Heebo',sans-serif;font-size:0.8rem;cursor:pointer;}
.header-right a:hover,.header-right button:hover{color:#fff;}
.header-right .sep{color:rgba(255,255,255,0.3);}
.user-name{color:#fff;font-weight:700;}
.header-nav{display:flex;padding:0 18px;background:rgba(0,0,0,0.2);}
.header-nav a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.78rem;font-weight:600;padding:7px 14px;border-left:1px solid rgba(255,255,255,0.1);}
.header-nav a:first-child{border-right:1px solid rgba(255,255,255,0.1);}
.header-nav a:hover{background:rgba(255,255,255,0.1);color:#fff;}
/* layout */
.wrap{max-width:980px;margin:0 auto;padding:18px 10px 60px;}
.breadcrumb{font-size:0.78rem;color:var(--muted);margin-bottom:14px;}
.breadcrumb a{color:var(--link);text-decoration:none;}
.breadcrumb a:hover{text-decoration:underline;}
/* post layout: sidebar + content */
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:8px;}
.post-card.pinned{border-top:3px solid var(--red);}
.post-inner{display:flex;}
/* sidebar */
.post-sidebar{width:130px;flex-shrink:0;background:var(--surface2);border-left:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--red-dark),var(--red));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:4px;flex-shrink:0;}
.sidebar-username{font-size:0.8rem;font-weight:800;color:var(--text);word-break:break-all;}
.rank-badge{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.sidebar-postcount{font-size:0.68rem;color:var(--muted);}
.sidebar-joined{font-size:0.65rem;color:#bbb;}
/* post body */
.post-body{flex:1;padding:16px 18px;min-width:0;}
.post-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge{background:var(--red-faint);color:var(--red);border:1px solid rgba(200,16,30,0.2);font-size:0.68rem;font-weight:800;padding:2px 10px;border-radius:3px;letter-spacing:.5px;}
.post-timestamp{font-size:0.72rem;color:var(--muted);}
.post-title-h{font-size:1.3rem;font-weight:900;line-height:1.3;margin-bottom:12px;}
.post-text{font-size:0.92rem;color:#333;line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.post-footer{display:flex;align-items:center;gap:12px;padding:10px 18px;border-top:1px solid var(--border);flex-wrap:wrap;}
/* vote */
.vote-row{display:flex;align-items:center;gap:4px;}
.vote-btn{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:4px;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.vote-btn:hover{border-color:var(--red);color:var(--red);}
.vote-btn.up.active{background:var(--red);border-color:var(--red);color:#fff;}
.vote-btn.down.active{background:#4477cc;border-color:#4477cc;color:#fff;}
.vote-count{font-size:0.9rem;font-weight:800;min-width:24px;text-align:center;}
/* action btns */
.act-btn{background:none;border:none;color:var(--muted);font-family:'Heebo',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;padding:4px 10px;border-radius:4px;transition:all .15s;}
.act-btn:hover{background:var(--red-faint);color:var(--red);}
.act-btn.danger:hover{background:rgba(200,0,0,0.06);color:#c00;}
/* COMMENTS */
.comments-title{font-size:0.85rem;font-weight:800;color:var(--muted);margin:20px 0 12px;text-transform:uppercase;letter-spacing:.5px;}
.comments-title span{color:var(--text);}
.comment-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:6px;}
.comment-inner{display:flex;}
.comment-sidebar{width:100px;flex-shrink:0;background:var(--surface2);border-left:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;}
.comment-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#555,#333);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;color:#fff;margin-bottom:2px;}
.comment-username{font-size:0.72rem;font-weight:800;color:var(--text);word-break:break-all;}
.comment-rank{font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:8px;}
.comment-body{flex:1;padding:12px 14px;min-width:0;}
.comment-meta-top{font-size:0.7rem;color:var(--muted);margin-bottom:8px;}
.comment-text{font-size:0.88rem;color:#333;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.quote-block{background:var(--surface2);border-right:3px solid var(--red);border-radius:0 4px 4px 0;padding:8px 12px;margin-bottom:10px;font-size:0.82rem;color:var(--muted);font-style:italic;}
.quote-block strong{color:var(--red);font-style:normal;}
.comment-footer{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
/* reply form */
.reply-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px;margin-top:20px;}
.reply-title{font-size:0.85rem;font-weight:800;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.reply-title span{color:var(--text);}
#reply-quote-preview{background:var(--surface2);border-right:3px solid var(--red);padding:8px 12px;margin-bottom:10px;font-size:0.82rem;color:var(--muted);font-style:italic;border-radius:0 4px 4px 0;display:none;}
#reply-quote-preview strong{color:var(--red);font-style:normal;}
#reply-quote-preview .clear-quote{float:left;background:none;border:none;color:#aaa;cursor:pointer;font-size:0.8rem;}
.reply-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.9rem;padding:10px 12px;outline:none;resize:vertical;min-height:90px;transition:border-color .2s;}
.reply-textarea:focus{border-color:var(--red);}
.reply-submit{margin-top:10px;background:var(--red);color:#fff;border:none;padding:9px 24px;border-radius:4px;font-family:'Heebo',sans-serif;font-weight:800;font-size:0.88rem;cursor:pointer;}
.reply-submit:disabled{opacity:.5;}
.login-prompt{text-align:center;padding:16px;color:var(--muted);}
.login-prompt button{background:none;border:none;color:var(--link);font-family:'Heebo',sans-serif;font-weight:800;cursor:pointer;font-size:0.88rem;}
/* edit form */
.edit-form{margin-top:10px;display:none;}
.edit-form textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.88rem;padding:8px 12px;outline:none;resize:vertical;min-height:70px;transition:border-color .2s;}
.edit-form textarea:focus{border-color:var(--red);}
.edit-btns{display:flex;gap:8px;margin-top:6px;}
.btn-save-edit{background:var(--red);color:#fff;border:none;padding:6px 16px;border-radius:4px;font-family:'Heebo',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;}
.btn-cancel-edit{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:4px;font-family:'Heebo',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;}
.edited-tag{font-size:0.65rem;color:#bbb;font-style:italic;margin-right:6px;}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.modal-header{background:linear-gradient(90deg,var(--red-dark),var(--red-mid));padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:1rem;font-weight:800;color:#fff;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.7);font-size:1.2rem;cursor:pointer;}
.modal-body{padding:20px 18px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:0.78rem;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.form-row input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.9rem;padding:9px 12px;outline:none;}
.form-row input:focus{border-color:var(--red);}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.btn-submit{background:var(--red);color:#fff;border:none;padding:9px 24px;border-radius:4px;font-family:'Heebo',sans-serif;font-weight:800;font-size:0.88rem;cursor:pointer;}
.btn-submit:disabled{opacity:.5;}
.btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:4px;font-family:'Heebo',sans-serif;font-weight:700;font-size:0.88rem;cursor:pointer;}
.error-box{background:var(--red-faint);border:1px solid rgba(200,16,30,0.25);color:var(--red);font-size:0.78rem;padding:8px 12px;border-radius:4px;margin-bottom:12px;display:none;}
.error-box.show{display:block;}
.auth-switch{text-align:center;margin-top:12px;font-size:0.8rem;color:var(--muted);}
.auth-switch button{background:none;border:none;color:var(--link);font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;}
.skel{background:linear-gradient(90deg,var(--surface2) 25%,#ebebf0 50%,var(--surface2) 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@media(max-width:600px){
  .post-sidebar{width:80px;padding:12px 6px;}
  .avatar{width:42px;height:42px;font-size:1rem;}
  .comment-sidebar{width:70px;}
  .comment-avatar{width:32px;height:32px;font-size:0.8rem;}
}
</style>
</head>
<body>
<div id="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-circle">ה</div>
      <div class="logo-text"><h1>פורום הפועל תל אביב</h1></div>
    </div>
    <div class="header-right" id="header-user"></div>
  </div>
  <div class="header-nav">
    <a href="home.html">ראשי</a>
    <a href="forum.html">פורום</a>
    <a href="forum-admin.html" id="admin-link" style="display:none;">⚙️ ניהול</a>
  </div>
</div>

<div class="wrap">
  <div class="breadcrumb" id="breadcrumb"><a href="home.html">ראשי</a> » <a href="forum.html">פורום</a> » טוען...</div>
  <div id="post-container"><div class="post-card"><div style="padding:24px;"><div class="skel" style="height:20px;width:60%;margin-bottom:12px;"></div><div class="skel" style="height:14px;width:90%;margin-bottom:6px;"></div><div class="skel" style="height:14px;width:75%;"></div></div></div></div>
  <div id="comments-area"></div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay hidden" id="auth-modal">
  <div class="modal">
    <div class="modal-header"><h2 id="auth-title">כניסה לפורום</h2><button class="modal-close" onclick="closeAuth()">✕</button></div>
    <div class="modal-body">
      <div class="error-box" id="auth-err"></div>
      <div class="form-row"><label>אימייל</label><input type="email" id="a-email" dir="ltr" placeholder="your@email.com"></div>
      <div class="form-row"><label>סיסמה</label><input type="password" id="a-pass" dir="ltr" placeholder="••••••••"></div>
      <div class="auth-switch" id="a-switch">אין חשבון? <button onclick="toggleAuth()">הרשם כאן</button></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAuth()">ביטול</button>
      <button class="btn-submit" id="a-btn" onclick="submitAuth()">כניסה</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient('https://ujpjgdtscgukldbtyadi.supabase.co','sb_publishable_56RVvOjXom3wW5OFZj6Qyw_r41lz2ux');
const postId=new URLSearchParams(location.search).get('id');
let currentUser=null,currentProfile=null,authMode='login',quoteData=null;

const RANKS=[
  {min:500,title:'אגדת הביציע',color:'#b8860b',bg:'rgba(184,134,11,0.12)'},
  {min:100,title:'ותיק ביציע',color:'#c8101e',bg:'rgba(200,16,30,0.1)'},
  {min:50,title:'אוהד נאמן',color:'#b06020',bg:'rgba(176,96,32,0.1)'},
  {min:10,title:'אוהד',color:'#2266aa',bg:'rgba(34,102,170,0.1)'},
  {min:1,title:'מתחיל',color:'#666',bg:'rgba(100,100,100,0.1)'},
  {min:0,title:'חבר חדש',color:'#aaa',bg:'rgba(150,150,150,0.08)'},
];
function getRank(n){return RANKS.find(r=>n>=r.min)||RANKS[RANKS.length-1];}
function avatar(name){return(name||'?')[0].toUpperCase();}
function timeAgo(ts){
  if(!ts)return'—';
  const d=Math.floor((Date.now()-new Date(ts))/1000);
  if(d<60)return'עכשיו';
  if(d<3600)return`לפני ${Math.floor(d/60)} דק׳`;
  if(d<86400)return`לפני ${Math.floor(d/3600)} שע׳`;
  if(d<604800)return`לפני ${Math.floor(d/86400)} ימים`;
  return new Date(ts).toLocaleDateString('he-IL');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

sb.auth.onAuthStateChange(async(_,session)=>{
  currentUser=session?.user||null;
  if(currentUser){
    const {data}=await sb.from('profiles').select('username,role,post_count,joined_at').eq('id',currentUser.id).single();
    currentProfile=data;
    document.getElementById('header-user').innerHTML=`
      <span class="user-name">שלום, ${data?.username||currentUser.email}</span>
      <span class="sep">|</span>
      <button onclick="logout()">יציאה</button>`;
    if(data?.role==='admin') document.getElementById('admin-link').style.display='block';
  } else {
    document.getElementById('header-user').innerHTML=`
      <a href="#" onclick="openAuth();return false;">כניסה</a>
      <span class="sep">|</span>
      <a href="#" onclick="openAuth('register');return false;">הרשמה</a>`;
  }
  renderReplyBox();
});

async function loadPost(){
  if(!postId){document.getElementById('post-container').innerHTML='<p style="padding:20px;color:var(--muted)">פוסט לא נמצא</p>';return;}
  const {data:post}=await sb.from('posts').select('*,profiles(username,role,post_count,joined_at)').eq('id',postId).single();
  if(!post){document.getElementById('post-container').innerHTML='<p style="padding:20px;color:var(--muted)">פוסט לא נמצא</p>';return;}
  document.title=`${post.title} | פורום הפועל`;
  document.getElementById('breadcrumb').innerHTML=`<a href="home.html">ראשי</a> » <a href="forum.html">פורום</a> » <a href="forum-category.html?cat=${encodeURIComponent(post.category)}">${post.category}</a> » ${post.title}`;

  let uv=0;
  if(currentUser){const {data:v}=await sb.from('post_votes').select('value').eq('user_id',currentUser.id).eq('post_id',postId).single();uv=v?.value||0;}
  const prof=post.profiles||{};
  const rank=getRank(prof.post_count||0);
  const canEdit=currentUser?.id===post.author_id;
  const canDelete=currentUser?.id===post.author_id||currentProfile?.role==='admin'||currentProfile?.role==='moderator';
  const canPin=currentProfile?.role==='admin'||currentProfile?.role==='moderator';

  document.getElementById('post-container').innerHTML=`
    <div class="post-card${post.pinned?' pinned':''}">
      <div class="post-inner">
        <div class="post-sidebar">
          <div class="avatar">${avatar(prof.username)}</div>
          <div class="sidebar-username">@${prof.username||'אנונימי'}</div>
          <span class="rank-badge" style="color:${rank.color};background:${rank.bg};">${rank.title}</span>
          <div class="sidebar-postcount">${prof.post_count||0} פוסטים</div>
          <div class="sidebar-joined">${prof.joined_at?new Date(prof.joined_at).toLocaleDateString('he-IL'):''}</div>
        </div>
        <div class="post-body">
          <div class="post-top">
            <span class="cat-badge">${post.category}</span>
            ${post.pinned?'<span class="cat-badge" style="background:rgba(200,16,30,0.15);">📌 מוצמד</span>':''}
            <span class="post-timestamp">${timeAgo(post.created_at)}${post.updated_at?` · <span class="edited-tag">(נערך)</span>`:''}</span>
          </div>
          <h1 class="post-title-h">${post.title}</h1>
          <div class="post-text" id="post-text-display">${escHtml(post.content)}</div>
          <div class="edit-form" id="post-edit-form">
            <textarea id="post-edit-ta">${post.content}</textarea>
            <div class="edit-btns">
              <button class="btn-save-edit" onclick="savePostEdit()">שמור</button>
              <button class="btn-cancel-edit" onclick="togglePostEdit(false)">ביטול</button>
            </div>
          </div>
        </div>
      </div>
      <div class="post-footer">
        <div class="vote-row">
          <button class="vote-btn up ${uv===1?'active':''}" onclick="votePost(1)" title="חיובי">▲</button>
          <span class="vote-count" id="pvc">${post.votes_count||0}</span>
          <button class="vote-btn down ${uv===-1?'active':''}" onclick="votePost(-1)" title="שלילי">▼</button>
        </div>
        ${canEdit?`<button class="act-btn" onclick="togglePostEdit(true)">✏️ עריכה</button>`:''}
        ${canPin?`<button class="act-btn" onclick="togglePin(${!post.pinned})">${post.pinned?'📌 הסר הצמדה':'📌 הצמד'}</button>`:''}
        ${canDelete?`<button class="act-btn danger" onclick="deletePost()">🗑️ מחק</button>`:''}
      </div>
    </div>`;
  loadComments();
}

async function votePost(val){
  if(!currentUser){openAuth();return;}
  const {data:ex}=await sb.from('post_votes').select('value').eq('user_id',currentUser.id).eq('post_id',postId).single();
  const el=document.getElementById('pvc');let cnt=parseInt(el.textContent);
  if(ex){
    if(ex.value===val){await sb.from('post_votes').delete().eq('user_id',currentUser.id).eq('post_id',postId);cnt-=val;}
    else{await sb.from('post_votes').update({value:val}).eq('user_id',currentUser.id).eq('post_id',postId);cnt+=val*2;}
  }else{await sb.from('post_votes').insert({user_id:currentUser.id,post_id:postId,value:val});cnt+=val;}
  await sb.from('posts').update({votes_count:cnt}).eq('id',postId);
  loadPost();
}
function togglePostEdit(show){
  document.getElementById('post-edit-form').style.display=show?'block':'none';
  document.getElementById('post-text-display').style.display=show?'none':'block';
}
async function savePostEdit(){
  const text=document.getElementById('post-edit-ta').value.trim();
  if(!text)return;
  await sb.from('posts').update({content:text,updated_at:new Date().toISOString()}).eq('id',postId);
  loadPost();
}
async function togglePin(val){
  await sb.from('posts').update({pinned:val}).eq('id',postId);
  loadPost();
}
async function deletePost(){
  if(!confirm('למחוק את הפוסט?'))return;
  await sb.from('posts').delete().eq('id',postId);
  const {data:post}=await sb.from('posts').select('category').eq('id',postId).single();
  window.location='forum.html';
}

async function loadComments(){
  const {data:comments}=await sb.from('comments').select('*,profiles(username,role,post_count,joined_at)').eq('post_id',postId).order('created_at',{ascending:true});
  let uvMap={};
  if(currentUser&&comments?.length){
    const ids=comments.map(c=>c.id);
    const {data:votes}=await sb.from('comment_votes').select('comment_id,value').eq('user_id',currentUser.id).in('comment_id',ids);
    votes?.forEach(v=>uvMap[v.comment_id]=v.value);
  }
  const area=document.getElementById('comments-area');
  const list=comments?.length?comments.map(c=>{
    const prof=c.profiles||{};
    const rank=getRank(prof.post_count||0);
    const canEdit=currentUser?.id===c.author_id;
    const canDel=currentUser?.id===c.author_id||currentProfile?.role==='admin'||currentProfile?.role==='moderator';
    const uv=uvMap[c.id]||0;
    let bodyHtml='';
    if(c.content.startsWith('[ציטוט:')){
      const m=c.content.match(/^\[ציטוט:([^\]]+)\]([\s\S]*?)\[\/ציטוט\]([\s\S]*)$/);
      if(m) bodyHtml=`<div class="quote-block"><strong>@${escHtml(m[1])} כתב:</strong><br>${escHtml(m[2].trim())}</div><div>${escHtml(m[3].trim())}</div>`;
      else bodyHtml=`<div class="comment-text">${escHtml(c.content)}</div>`;
    }else bodyHtml=`<div class="comment-text">${escHtml(c.content)}</div>`;
    return `<div class="comment-card" id="c-${c.id}">
      <div class="comment-inner">
        <div class="comment-sidebar">
          <div class="comment-avatar">${avatar(prof.username)}</div>
          <div class="comment-username">@${prof.username||'?'}</div>
          <span class="comment-rank" style="color:${rank.color};background:${rank.bg};">${rank.title}</span>
        </div>
        <div class="comment-body">
          <div class="comment-meta-top">${timeAgo(c.created_at)}${c.updated_at?' · <span class="edited-tag">(נערך)</span>':''}</div>
          <div id="ctxt-${c.id}">${bodyHtml}</div>
          <div class="edit-form" id="cedit-${c.id}">
            <textarea id="cta-${c.id}">${c.content}</textarea>
            <div class="edit-btns">
              <button class="btn-save-edit" onclick="saveCommentEdit('${c.id}')">שמור</button>
              <button class="btn-cancel-edit" onclick="toggleCommentEdit('${c.id}',false)">ביטול</button>
            </div>
          </div>
          <div class="comment-footer">
            <div class="vote-row">
              <button class="vote-btn up ${uv===1?'active':''}" onclick="voteComment('${c.id}',1)">▲</button>
              <span class="vote-count" id="cvc-${c.id}">${c.votes_count||0}</span>
              <button class="vote-btn down ${uv===-1?'active':''}" onclick="voteComment('${c.id}',-1)">▼</button>
            </div>
            <button class="act-btn" onclick="setQuote('${c.id}','${escHtml(prof.username||'')}')">💬 ציטוט</button>
            ${canEdit?`<button class="act-btn" onclick="toggleCommentEdit('${c.id}',true)">✏️ עריכה</button>`:''}
            ${canDel?`<button class="act-btn danger" onclick="deleteComment('${c.id}')">🗑️</button>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join(''):'<p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px;">אין תגובות עדיין — היה הראשון!</p>';
  area.innerHTML=`<div class="comments-title"><span>${comments?.length||0}</span> תגובות</div>${list}<div id="reply-box"></div>`;
  renderReplyBox();
}

function setQuote(commentId,username){
  const el=document.getElementById(`ctxt-${commentId}`);
  const text=el?.innerText?.trim().slice(0,200)||'';
  quoteData={username,text};
  const preview=document.getElementById('reply-quote-preview');
  if(preview){preview.style.display='block';preview.innerHTML=`<strong>@${username} כתב:</strong><br>${escHtml(text)} <button class="clear-quote" onclick="clearQuote()">✕</button>`;}
  document.getElementById('reply-textarea')?.focus();
  document.getElementById('reply-box')?.scrollIntoView({behavior:'smooth'});
}
function clearQuote(){quoteData=null;const p=document.getElementById('reply-quote-preview');if(p)p.style.display='none';}

function toggleCommentEdit(id,show){
  document.getElementById(`cedit-${id}`).style.display=show?'block':'none';
  document.getElementById(`ctxt-${id}`).style.display=show?'none':'block';
}
async function saveCommentEdit(id){
  const text=document.getElementById(`cta-${id}`).value.trim();
  if(!text)return;
  await sb.from('comments').update({content:text,updated_at:new Date().toISOString()}).eq('id',id);
  loadComments();
}

async function voteComment(id,val){
  if(!currentUser){openAuth();return;}
  const {data:ex}=await sb.from('comment_votes').select('value').eq('user_id',currentUser.id).eq('comment_id',id).single();
  const {data:c}=await sb.from('comments').select('votes_count').eq('id',id).single();
  let cnt=c?.votes_count||0;
  if(ex){
    if(ex.value===val){await sb.from('comment_votes').delete().eq('user_id',currentUser.id).eq('comment_id',id);cnt-=val;}
    else{await sb.from('comment_votes').update({value:val}).eq('user_id',currentUser.id).eq('comment_id',id);cnt+=val*2;}
  }else{await sb.from('comment_votes').insert({user_id:currentUser.id,comment_id:id,value:val});cnt+=val;}
  await sb.from('comments').update({votes_count:cnt}).eq('id',id);
  loadComments();
}
async function deleteComment(id){
  if(!confirm('למחוק תגובה?'))return;
  await sb.from('comments').delete().eq('id',id);
  const {data:post}=await sb.from('posts').select('comments_count').eq('id',postId).single();
  await sb.from('posts').update({comments_count:Math.max(0,(post?.comments_count||1)-1)}).eq('id',postId);
  loadComments();
}

function renderReplyBox(){
  const el=document.getElementById('reply-box');if(!el)return;
  if(currentUser){
    el.innerHTML=`
      <div class="reply-section">
        <div class="reply-title">השב <span>לנושא</span></div>
        <div id="reply-quote-preview" style="display:none;"></div>
        <textarea class="reply-textarea" id="reply-textarea" placeholder="כתוב תגובה..."></textarea>
        <button class="reply-submit" onclick="submitComment()">שלח תגובה</button>
      </div>`;
  }else{
    el.innerHTML=`<div class="login-prompt">כדי להגיב <button onclick="openAuth()">התחבר / הרשם</button></div>`;
  }
}
async function submitComment(){
  const ta=document.getElementById('reply-textarea');
  let text=ta.value.trim();if(!text)return;
  if(quoteData) text=`[ציטוט:${quoteData.username}]${quoteData.text}[/ציטוט]\n${text}`;
  const btn=document.querySelector('.reply-submit');btn.disabled=true;btn.textContent='...';
  const {error}=await sb.from('comments').insert({post_id:postId,author_id:currentUser.id,content:text});
  if(!error){
    const {data:post}=await sb.from('posts').select('comments_count').eq('id',postId).single();
    await sb.from('posts').update({comments_count:(post?.comments_count||0)+1}).eq('id',postId);
    quoteData=null;loadComments();
  }
  btn.disabled=false;btn.textContent='שלח תגובה';
}

// AUTH
function openAuth(m='login'){authMode=m;document.getElementById('auth-modal').classList.remove('hidden');updateAuthUI();}
function closeAuth(){document.getElementById('auth-modal').classList.add('hidden');document.getElementById('auth-err').classList.remove('show');}
function toggleAuth(){authMode=authMode==='login'?'register':'login';updateAuthUI();}
function updateAuthUI(){
  const l=authMode==='login';
  document.getElementById('auth-title').textContent=l?'כניסה לפורום':'הרשמה לפורום';
  document.getElementById('a-btn').textContent=l?'כניסה':'הרשמה';
  document.getElementById('a-switch').innerHTML=l?'אין חשבון? <button onclick="toggleAuth()">הרשם כאן</button>':'יש חשבון? <button onclick="toggleAuth()">כניסה</button>';
}
async function submitAuth(){
  const email=document.getElementById('a-email').value.trim(),pass=document.getElementById('a-pass').value;
  const btn=document.getElementById('a-btn'),errEl=document.getElementById('auth-err');
  if(!email||!pass)return;
  btn.disabled=true;btn.textContent='...';
  let err;
  if(authMode==='login'){const r=await sb.auth.signInWithPassword({email,password:pass});err=r.error;}
  else{const r=await sb.auth.signUp({email,password:pass});err=r.error;
    if(!err){errEl.style.cssText='background:rgba(0,150,0,.08);border-color:rgba(0,150,0,.3);color:green;display:block;';
      errEl.textContent='נשלח מייל אימות!';btn.disabled=false;btn.textContent='הרשמה';return;}
  }
  if(err){errEl.textContent=err.message.includes('Invalid')?'אימייל או סיסמה שגויים':err.message;errEl.classList.add('show');}
  else{closeAuth();loadPost();}
  btn.disabled=false;btn.textContent=authMode==='login'?'כניסה':'הרשמה';
}
async function logout(){await sb.auth.signOut();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAuth();});
document.getElementById('auth-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAuth();});
loadPost();
</script>
</body>
</html>
