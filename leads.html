<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פאנל ניהול | בודפשט 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #e61e2a; }
        body { background: #0a0a0a; font-family: 'Heebo', sans-serif; color: #fff; }
        .input-field {
            background: #0d0d0d; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 0.75rem 1rem; border-radius: 0.5rem;
            outline: none; font-family: 'Heebo', sans-serif; transition: border-color 0.2s;
            width: 100%;
        }
        .input-field:focus { border-color: var(--accent); }
        .input-field::placeholder { color: #444; }
        select.input-field option { background: #1a1a1a; }
        .card { background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 1rem; }
        .status-badge { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 999px; cursor: pointer; transition: all 0.2s; }
        .status-ממתין { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
        .status-יצרנו-קשר { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .status-הוזמן { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .status-בוטל { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .lead-row { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
        .lead-row:last-child { border-bottom: none; }
        .lead-row:hover { background: rgba(255,255,255,0.02); }
        .stat-card { background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 0.75rem; padding: 1.25rem; }
        .btn { background: var(--accent); color: white; font-weight: 700; padding: 0.65rem 1.5rem; border-radius: 999px; border: none; cursor: pointer; font-family: 'Heebo', sans-serif; transition: all 0.2s; font-size: 0.9rem; white-space: nowrap; }
        .btn:hover { background: #b01520; transform: translateY(-1px); }
        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #15803d; }
        .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #aaa; font-weight: 600; padding: 0.55rem 1.25rem; border-radius: 999px; cursor: pointer; font-family: 'Heebo', sans-serif; transition: all 0.2s; font-size: 0.85rem; white-space: nowrap; }
        .btn-ghost:hover { border-color: white; color: white; }
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; padding: 1rem; overflow-y: auto; }
        .modal-bg.show { display: flex; }
        .login-screen { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 1rem; }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(230,30,42,0.4), transparent); }
        #app { display: none; }
        .filter-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #888; padding: 0.35rem 0.9rem; border-radius: 999px; cursor: pointer; font-family: 'Heebo', sans-serif; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: white; background: rgba(230,30,42,0.1); }
        .export-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; padding: 0.45rem 1rem; border-radius: 0.5rem; cursor: pointer; font-family: 'Heebo', sans-serif; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
        .export-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .tab-btn { padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; border: none; font-family: 'Heebo', sans-serif; color: #888; background: transparent; display: flex; align-items: center; gap: 0.4rem; }
        .tab-btn.active { background: rgba(230,30,42,0.12); color: white; border: 1px solid rgba(230,30,42,0.3); }
        .tab-btn:not(.active):hover { color: #ccc; background: rgba(255,255,255,0.05); }
        .pkg-card { background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 1rem; transition: border-color 0.2s; }
        .pkg-card:hover { border-color: rgba(255,255,255,0.15); }
        .pkg-status-active { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
        .pkg-status-soldout { background: rgba(234,179,8,0.12); color: #eab308; border: 1px solid rgba(234,179,8,0.25); }
        .pkg-status-hidden { background: rgba(107,114,128,0.12); color: #9ca3af; border: 1px solid rgba(107,114,128,0.25); }
        .pkg-status-label { font-size: 0.7rem; font-weight: 800; padding: 0.25rem 0.7rem; border-radius: 999px; letter-spacing: 0.05em; }
        .field-label { font-size: 0.72rem; font-weight: 700; color: #666; margin-bottom: 0.35rem; display: block; letter-spacing: 0.04em; text-transform: uppercase; }
        .save-toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #16a34a; color: white; font-weight: 700; padding: 0.65rem 1.5rem; border-radius: 999px; font-size: 0.9rem; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; font-family: 'Heebo', sans-serif; white-space: nowrap; }
        .save-toast.show { opacity: 1; }
        textarea.input-field { resize: vertical; min-height: 60px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <img src="https://raw.githubusercontent.com/azranmor66/azran/main/assets/images/LogoAzranJosepwhite.png"
                 alt="Logo" class="h-12 object-contain mx-auto mb-4"
                 onerror="this.src='https://raw.githubusercontent.com/azranmor66/azran/main/assets/images/logo.png'">
            <h1 class="text-2xl font-black">פאנל ניהול</h1>
            <p class="text-gray-500 text-sm mt-1">בודפשט 2026 — פרטי</p>
        </div>
        <div class="card p-6">
            <label class="block text-xs font-bold text-gray-400 mb-2">סיסמה</label>
            <input type="password" id="password-input" class="input-field mb-3" placeholder="הזן סיסמה" onkeydown="if(event.key==='Enter') login()">
            <p id="login-error" class="text-red-400 text-xs mb-3 hidden">סיסמה שגויה</p>
            <button onclick="login()" class="btn w-full">כניסה</button>
        </div>
        <p class="text-center text-gray-700 text-xs mt-6">
            <a href="index.html" class="hover:text-gray-500">← חזרה לדף הראשי</a>
        </p>
    </div>
</div>

<!-- APP -->
<div id="app" class="min-h-screen">

    <!-- Header -->
    <div class="border-b border-white/[0.06] px-4 py-3 sticky top-0 bg-[#0a0a0a] z-40">
        <div class="max-w-5xl mx-auto flex items-center justify-between gap-3 flex-wrap">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/azranmor66/azran/main/assets/images/LogoAzranJosepwhite.png"
                     alt="Logo" class="h-7 object-contain"
                     onerror="this.src='https://raw.githubusercontent.com/azranmor66/azran/main/assets/images/logo.png'">
                <span class="font-black text-sm">פאנל ניהול — בודפשט 2026</span>
            </div>
            <div class="flex items-center gap-2">
                <a href="hapoel-budapest.html" target="_blank" class="export-btn text-xs">
                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                    דף הציבורי
                </a>
                <button onclick="logout()" class="btn-ghost text-xs py-1.5 px-3">יציאה</button>
            </div>
        </div>
        <!-- Tabs -->
        <div class="max-w-5xl mx-auto flex gap-1 mt-3">
            <button class="tab-btn active" id="tab-leads-btn" onclick="switchTab('leads')">
                <i data-lucide="users" class="w-4 h-4"></i> לידים
                <span id="leads-count-badge" class="text-xs bg-red-900/40 text-red-300 px-1.5 py-0.5 rounded-full font-bold"></span>
            </button>
            <button class="tab-btn" id="tab-packages-btn" onclick="switchTab('packages')">
                <i data-lucide="package" class="w-4 h-4"></i> ניהול חבילות
            </button>
        </div>
    </div>

    <!-- LEADS TAB -->
    <div id="tab-leads" class="max-w-5xl mx-auto px-4 py-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8" id="stats-grid"></div>
        <div class="flex flex-wrap gap-3 items-center justify-between mb-5">
            <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs text-gray-500 font-bold">סינון:</span>
                <button class="filter-btn active" onclick="setFilter('all',this)">הכל</button>
                <button class="filter-btn" onclick="setFilter('ממתין',this)">ממתין</button>
                <button class="filter-btn" onclick="setFilter('יצרנו קשר',this)">יצרנו קשר</button>
                <button class="filter-btn" onclick="setFilter('הוזמן',this)">הוזמן</button>
                <button class="filter-btn" onclick="setFilter('בוטל',this)">בוטל</button>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" id="search-input" class="input-field text-sm" style="width:200px" placeholder="חיפוש..." oninput="renderLeads()">
                <button onclick="exportCSV()" class="export-btn">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> CSV
                </button>
            </div>
        </div>
        <div class="card" id="leads-container">
            <div class="p-8 text-center text-gray-600">
                <i data-lucide="inbox" class="w-8 h-8 mx-auto mb-2 opacity-40"></i>
                <p class="text-sm">אין לידים עדיין</p>
            </div>
        </div>
        <p class="text-xs text-gray-700 mt-4 text-center">נתונים שמורים בדפדפן זה. לשיתוף — ייצא CSV.</p>
    </div>

    <!-- PACKAGES TAB -->
    <div id="tab-packages" class="max-w-5xl mx-auto px-4 py-6 hidden">
        <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
            <div>
                <h2 class="text-xl font-black">ניהול חבילות</h2>
                <p class="text-gray-500 text-sm mt-0.5">שינויים נשמרים מיד ומשתקפים בדף הציבורי</p>
            </div>
            <button onclick="addPackage()" class="btn btn-green flex items-center gap-2 text-sm">
                <i data-lucide="plus" class="w-4 h-4"></i> חבילה חדשה
            </button>
        </div>
        <div id="packages-container" class="space-y-4"></div>
    </div>
</div>

<!-- LEAD DETAIL MODAL -->
<div class="modal-bg" id="detail-modal">
    <div class="bg-[#111] border border-white/10 rounded-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-lg font-black" id="modal-name"></h3>
            <button onclick="closeLeadModal()" class="text-gray-600 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="modal-content" class="space-y-3"></div>
        <div class="mt-5 pt-5 border-t border-white/[0.06]">
            <p class="text-xs font-bold text-gray-500 mb-2">עדכון סטטוס:</p>
            <div class="flex flex-wrap gap-2">
                <button onclick="updateStatus('ממתין')" class="status-badge status-ממתין">ממתין</button>
                <button onclick="updateStatus('יצרנו קשר')" class="status-badge status-יצרנו-קשר">יצרנו קשר</button>
                <button onclick="updateStatus('הוזמן')" class="status-badge status-הוזמן">הוזמן ✓</button>
                <button onclick="updateStatus('בוטל')" class="status-badge status-בוטל">בוטל</button>
            </div>
        </div>
        <div class="mt-4">
            <p class="text-xs font-bold text-gray-500 mb-2">הערת מעקב:</p>
            <textarea id="modal-note" class="input-field resize-none text-sm" rows="2" placeholder="הוסף הערה פנימית..."></textarea>
            <button onclick="saveNote()" class="btn text-sm mt-2 px-4 py-2">שמור הערה</button>
        </div>
        <div class="mt-4 flex justify-end">
            <button onclick="deleteLead()" class="text-xs text-red-700 hover:text-red-500 transition">מחק ליד</button>
        </div>
    </div>
</div>

<!-- PACKAGE EDIT MODAL -->
<div class="modal-bg" id="pkg-modal">
    <div class="bg-[#111] border border-white/10 rounded-2xl p-6 w-full max-w-2xl max-h-[92vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-lg font-black" id="pkg-modal-title">עריכת חבילה</h3>
            <button onclick="closePkgModal()" class="text-gray-600 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div class="space-y-4">
            <!-- Status -->
            <div>
                <label class="field-label">סטטוס חבילה</label>
                <select id="pkg-status" class="input-field">
                    <option value="active">פעילה ✓</option>
                    <option value="soldout">אזלה / נגמרה</option>
                    <option value="hidden">מוסתרת</option>
                </select>
            </div>

            <!-- Basic info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="field-label">שם החבילה</label>
                    <input type="text" id="pkg-name" class="input-field" placeholder="חווית בודפשט מלאה">
                </div>
                <div>
                    <label class="field-label">מחיר לאדם (₪)</label>
                    <input type="text" id="pkg-price" class="input-field" placeholder="3,213">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="field-label">תאריכים</label>
                    <input type="text" id="pkg-dates" class="input-field" placeholder="22–25/07/26">
                </div>
                <div>
                    <label class="field-label">ימים</label>
                    <input type="text" id="pkg-days" class="input-field" placeholder="רביעי–שבת">
                </div>
            </div>

            <!-- Flight -->
            <div class="bg-white/[0.03] rounded-xl p-4 border border-white/[0.05]">
                <p class="text-xs font-black text-gray-400 mb-3 uppercase tracking-wider">טיסות</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div>
                        <label class="field-label">חברת תעופה</label>
                        <input type="text" id="pkg-airline" class="input-field" placeholder="ארקיע / אלעל / ריק">
                    </div>
                    <div>
                        <label class="field-label">שעת יציאה</label>
                        <input type="text" id="pkg-flight-out" class="input-field" placeholder="14:40">
                    </div>
                    <div>
                        <label class="field-label">שעת חזרה</label>
                        <input type="text" id="pkg-flight-in" class="input-field" placeholder="19:10">
                    </div>
                </div>
                <div class="mt-3">
                    <label class="field-label">כבודה</label>
                    <input type="text" id="pkg-luggage" class="input-field" placeholder="מזוודה 20kg לנוסע">
                </div>
            </div>

            <!-- Hotel -->
            <div class="bg-white/[0.03] rounded-xl p-4 border border-white/[0.05]">
                <p class="text-xs font-black text-gray-400 mb-3 uppercase tracking-wider">מלון</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="field-label">שם המלון</label>
                        <input type="text" id="pkg-hotel" class="input-field" placeholder="Eurostars Palazzo Zichy">
                    </div>
                    <div>
                        <label class="field-label">בסיס</label>
                        <input type="text" id="pkg-hotel-basis" class="input-field" placeholder="Deluxe Room, לינה + ארוחת בוקר">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                    <div>
                        <label class="field-label">ביטול חינם עד תאריך</label>
                        <input type="text" id="pkg-cancel-date" class="input-field" placeholder="18/07/26">
                    </div>
                    <div>
                        <label class="field-label">מספר לילות (תווית)</label>
                        <input type="text" id="pkg-nights" class="input-field" placeholder="4 לילות">
                    </div>
                </div>
            </div>

            <!-- Extras -->
            <div>
                <label class="field-label">הסעות / תוספות</label>
                <input type="text" id="pkg-shuttle" class="input-field" placeholder="הסעה הלוך-חזור למשחק">
            </div>

            <div>
                <label class="field-label">הערה / תג מיוחד (לא חובה)</label>
                <input type="text" id="pkg-note" class="input-field" placeholder='מומלץ / מבצע / חדש...'>
            </div>
        </div>

        <div class="mt-6 flex items-center justify-between gap-3 flex-wrap">
            <button onclick="deletePkg()" class="text-xs text-red-700 hover:text-red-500 transition">מחק חבילה</button>
            <div class="flex gap-2">
                <button onclick="closePkgModal()" class="btn-ghost text-sm">ביטול</button>
                <button onclick="savePkg()" class="btn text-sm px-6">שמור שינויים</button>
            </div>
        </div>
    </div>
</div>

<!-- Save Toast -->
<div id="save-toast" class="save-toast">✓ נשמר בהצלחה</div>

<script>
// ===================== AUTH =====================
const PASS = 'hapoel2026';

function login() {
    if (document.getElementById('password-input').value === PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        renderAll();
        switchTab('leads');
    } else {
        document.getElementById('login-error').classList.remove('hidden');
    }
}
function logout() {
    document.getElementById('login-screen').style.display = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('password-input').value = '';
}

// ===================== TABS =====================
function switchTab(tab) {
    document.getElementById('tab-leads').classList.toggle('hidden', tab !== 'leads');
    document.getElementById('tab-packages').classList.toggle('hidden', tab !== 'packages');
    document.getElementById('tab-leads-btn').classList.toggle('active', tab === 'leads');
    document.getElementById('tab-packages-btn').classList.toggle('active', tab === 'packages');
    if (tab === 'packages') renderPackages();
}

// ===================== LEADS =====================
let currentFilter = 'all';
let currentLeadId = null;

function getLeads() { return JSON.parse(localStorage.getItem('budapest_leads') || '[]'); }
function saveLeads(l) { localStorage.setItem('budapest_leads', JSON.stringify(l)); }

function renderAll() { renderStats(); renderLeads(); updateLeadsCountBadge(); lucide.createIcons(); }

function updateLeadsCountBadge() {
    const n = getLeads().filter(l => l.status === 'ממתין').length;
    const el = document.getElementById('leads-count-badge');
    el.textContent = n > 0 ? n : '';
    el.style.display = n > 0 ? '' : 'none';
}

function renderStats() {
    const leads = getLeads();
    const stats = [
        { label: 'סה"כ לידים', value: leads.length, icon: 'users', color: 'text-white' },
        { label: 'ממתינים', value: leads.filter(l => l.status === 'ממתין').length, icon: 'clock', color: 'text-yellow-400' },
        { label: 'הוזמנו', value: leads.filter(l => l.status === 'הוזמן').length, icon: 'check-circle', color: 'text-green-400' },
        { label: 'סה"כ נוסעים', value: leads.reduce((s, l) => s + (parseInt(l.passengers) || 0), 0), icon: 'plane', color: 'text-red-400' },
    ];
    document.getElementById('stats-grid').innerHTML = stats.map(s => `
        <div class="stat-card">
            <div class="flex items-center gap-2 mb-1">
                <i data-lucide="${s.icon}" class="w-4 h-4 ${s.color} opacity-70"></i>
                <span class="text-xs text-gray-500">${s.label}</span>
            </div>
            <div class="text-3xl font-black ${s.color}">${s.value}</div>
        </div>
    `).join('');
    lucide.createIcons();
}

function setFilter(val, btn) {
    currentFilter = val;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLeads();
}

function renderLeads() {
    const leads = getLeads();
    const search = (document.getElementById('search-input').value || '').trim().toLowerCase();
    const filtered = leads.filter(l => {
        const matchFilter = currentFilter === 'all' || l.status === currentFilter;
        const matchSearch = !search || l.nameHe.toLowerCase().includes(search) || l.nameEn.toLowerCase().includes(search) || l.phone.includes(search) || l.email.toLowerCase().includes(search);
        return matchFilter && matchSearch;
    });
    const container = document.getElementById('leads-container');
    if (!filtered.length) {
        container.innerHTML = `<div class="p-8 text-center text-gray-600 text-sm">אין תוצאות</div>`;
        lucide.createIcons();
        return;
    }
    const sc = { 'ממתין': 'status-ממתין', 'יצרנו קשר': 'status-יצרנו-קשר', 'הוזמן': 'status-הוזמן', 'בוטל': 'status-בוטל' };
    container.innerHTML = filtered.map(l => `
        <div class="lead-row px-4 py-4 flex items-center justify-between gap-4 cursor-pointer flex-wrap" onclick="openLeadModal('${l.id}')">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-9 h-9 rounded-full bg-red-900/30 border border-red-800/30 flex items-center justify-center flex-shrink-0">
                    <span class="text-sm font-bold text-red-400">${l.nameHe.charAt(0)}</span>
                </div>
                <div class="min-w-0">
                    <p class="font-bold text-sm truncate">${l.nameHe}</p>
                    <p class="text-gray-500 text-xs truncate">${l.phone} | ${l.passengers} נוסעים</p>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap flex-shrink-0">
                <span class="text-xs text-gray-600 hidden md:block truncate max-w-[160px]">${l.packageType.split(' - ')[0]}</span>
                <span class="status-badge ${sc[l.status] || 'status-ממתין'}">${l.status}</span>
                <span class="text-gray-700 text-xs">${new Date(l.submittedAt).toLocaleDateString('he-IL')}</span>
                <i data-lucide="chevron-left" class="w-4 h-4 text-gray-700"></i>
            </div>
        </div>
    `).join('');
    lucide.createIcons();
}

function openLeadModal(id) {
    const lead = getLeads().find(l => l.id === id);
    if (!lead) return;
    currentLeadId = id;
    document.getElementById('modal-name').textContent = lead.nameHe;
    document.getElementById('modal-note').value = lead.note || '';
    const fields = [
        ['שם בעברית', lead.nameHe], ['שם באנגלית', lead.nameEn], ['ת.ז.', lead.idNumber],
        ['טלפון', `<a href="tel:${lead.phone}" class="text-blue-400 hover:underline">${lead.phone}</a>`],
        ['אימייל', `<a href="mailto:${lead.email}" class="text-blue-400 hover:underline">${lead.email}</a>`],
        ['נוסעים', lead.passengers], ['חבילה', lead.packageType],
        ['הערות', lead.notes || '—'], ['נשלח', new Date(lead.submittedAt).toLocaleString('he-IL')],
    ];
    document.getElementById('modal-content').innerHTML = fields.map(([k, v]) => `
        <div class="flex gap-3 text-sm"><span class="text-gray-500 font-bold w-24 flex-shrink-0">${k}:</span><span>${v}</span></div>
    `).join('');
    document.getElementById('detail-modal').classList.add('show');
    lucide.createIcons();
}
function closeLeadModal() { document.getElementById('detail-modal').classList.remove('show'); currentLeadId = null; }

function updateStatus(status) {
    if (!currentLeadId) return;
    const leads = getLeads();
    const lead = leads.find(l => l.id === currentLeadId);
    if (lead) { lead.status = status; saveLeads(leads); renderAll(); }
}
function saveNote() {
    if (!currentLeadId) return;
    const leads = getLeads();
    const lead = leads.find(l => l.id === currentLeadId);
    if (lead) { lead.note = document.getElementById('modal-note').value; saveLeads(leads); renderStats(); }
}
function deleteLead() {
    if (!currentLeadId || !confirm('למחוק ליד זה לצמיתות?')) return;
    saveLeads(getLeads().filter(l => l.id !== currentLeadId));
    closeLeadModal(); renderAll();
}
function exportCSV() {
    const leads = getLeads();
    if (!leads.length) { alert('אין לידים לייצוא'); return; }
    const headers = ['תאריך','שם בעברית','שם באנגלית','ת.ז.','טלפון','אימייל','נוסעים','חבילה','סטטוס','הערות','הערת מעקב'];
    const rows = leads.map(l => [new Date(l.submittedAt).toLocaleString('he-IL'), l.nameHe, l.nameEn, l.idNumber, l.phone, l.email, l.passengers, l.packageType, l.status, (l.notes||'').replace(/,/g,' '), (l.note||'').replace(/,/g,' ')]);
    const csv = '﻿' + [headers,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download = 'budapest_leads_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
}

// ===================== PACKAGES =====================

    {
        id: 'pkg_1', number: 1, status: 'active', recommended: false,
        name: 'חווית בודפשט מלאה', price: '3,213', dates: '22–25/07/26', days: 'רביעי–שבת', nights: '4 לילות',
        airline: '', flightOut: '14:40', flightIn: '19:10', luggage: 'מזוודה 20kg לנוסע',
        hotel: 'Eurostars Palazzo Zichy', hotelBasis: 'Deluxe Room, לינה + ארוחת בוקר',
        cancelDate: '18/07/26', shuttle: 'הסעה הלוך-חזור למשחק', note: ''
    },
    {
        id: 'pkg_2', number: 2, status: 'active', recommended: true,
        name: 'סופ"ש ארוך', price: '3,435', dates: '23–26/07/26', days: 'חמישי–ראשון', nights: '4 לילות',
        airline: 'ארקיע', flightOut: '06:00', flightIn: '20:40', luggage: 'מזוודה 20kg לנוסע',
        hotel: 'Eurostars Palazzo Zichy', hotelBasis: 'Deluxe Room, לינה + ארוחת בוקר',
        cancelDate: '19/07/26', shuttle: 'הסעות הלוך-חזור למשחק', note: 'מומלץ'
    },
    {
        id: 'pkg_3', number: 3, status: 'active', recommended: false,
        name: 'קוויקי בהונגריה', price: '4,480', dates: '22–24/07/26', days: 'רביעי–שישי', nights: '2 לילות',
        airline: 'וויזאייר / בלו בירד', flightOut: '10:10', flightIn: '19:25', luggage: 'מזוודה 20kg לנוסע',
        hotel: 'Eurostars Palazzo Zichy', hotelBasis: 'Deluxe Room, לינה + ארוחת בוקר',
        cancelDate: '18/07/26', shuttle: 'הסעות הלוך-חזור למשחק', note: ''
    }
];

function getPackages() {
    const stored = localStorage.getItem('budapest_packages');
    return stored ? JSON.parse(stored) : DEFAULT_PACKAGES;
}
function savePackages(pkgs) { localStorage.setItem('budapest_packages', JSON.stringify(pkgs)); }

function renderPackages() {
    const pkgs = getPackages();
    const container = document.getElementById('packages-container');
    if (!pkgs.length) {
        container.innerHTML = `<div class="card p-8 text-center text-gray-600 text-sm">אין חבילות. הוסף חבילה חדשה.</div>`;
        lucide.createIcons(); return;
    }
    const statusLabel = { active: 'פעילה', soldout: 'אזלה', hidden: 'מוסתרת' };
    const statusClass = { active: 'pkg-status-active', soldout: 'pkg-status-soldout', hidden: 'pkg-status-hidden' };
    const statusIcon = { active: 'check-circle', soldout: 'x-circle', hidden: 'eye-off' };

    container.innerHTML = pkgs.map((p, i) => `
        <div class="pkg-card p-5">
            <div class="flex items-start justify-between gap-3 flex-wrap mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-red-900/30 border border-red-800/30 flex items-center justify-center flex-shrink-0">
                        <span class="text-xs font-black text-red-400">${i + 1}</span>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <h3 class="font-black text-base">${p.name}</h3>
                            ${p.note ? `<span class="text-xs bg-red-900/30 text-red-300 px-2 py-0.5 rounded-full font-bold">${p.note}</span>` : ''}
                        </div>
                        <p class="text-gray-500 text-xs mt-0.5">${p.dates} | ${p.days} | ${p.nights}</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="pkg-status-label ${statusClass[p.status]}">
                        ${statusLabel[p.status]}
                    </span>
                    <span class="text-xl font-black">${p.price}₪</span>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4 text-xs text-gray-500">
                <div class="flex items-center gap-1"><i data-lucide="plane-takeoff" class="w-3 h-3 text-red-500 flex-shrink-0"></i> ${p.airline ? p.airline + ' ' : ''}${p.flightOut} → ${p.flightIn}</div>
                <div class="flex items-center gap-1"><i data-lucide="briefcase" class="w-3 h-3 text-red-500 flex-shrink-0"></i> ${p.luggage}</div>
                <div class="flex items-center gap-1"><i data-lucide="building-2" class="w-3 h-3 text-red-500 flex-shrink-0"></i> ${p.hotel}</div>
                <div class="flex items-center gap-1"><i data-lucide="shield-check" class="w-3 h-3 text-red-500 flex-shrink-0"></i> ביטול עד ${p.cancelDate}</div>
            </div>

            <div class="flex items-center justify-between gap-2 flex-wrap pt-3 border-t border-white/[0.05]">
                <div class="flex gap-2 flex-wrap">
                    <button onclick="quickStatus('${p.id}','active')" class="text-xs px-3 py-1.5 rounded-full border transition font-bold ${p.status==='active' ? 'border-green-500 text-green-400 bg-green-900/20' : 'border-white/10 text-gray-600 hover:border-green-500/50 hover:text-green-600'}">פעילה</button>
                    <button onclick="quickStatus('${p.id}','soldout')" class="text-xs px-3 py-1.5 rounded-full border transition font-bold ${p.status==='soldout' ? 'border-yellow-500 text-yellow-400 bg-yellow-900/20' : 'border-white/10 text-gray-600 hover:border-yellow-500/50 hover:text-yellow-600'}">אזלה</button>
                    <button onclick="quickStatus('${p.id}','hidden')" class="text-xs px-3 py-1.5 rounded-full border transition font-bold ${p.status==='hidden' ? 'border-gray-500 text-gray-400 bg-gray-900/20' : 'border-white/10 text-gray-600 hover:border-gray-500/50 hover:text-gray-500'}">הסתר</button>
                </div>
                <button onclick="editPackage('${p.id}')" class="btn-ghost text-xs py-1.5 px-4 flex items-center gap-1.5">
                    <i data-lucide="pencil" class="w-3.5 h-3.5"></i> ערוך פרטים
                </button>
            </div>
        </div>
    `).join('');
    lucide.createIcons();
}

function quickStatus(id, status) {
    const pkgs = getPackages();
    const p = pkgs.find(p => p.id === id);
    if (p) { p.status = status; savePackages(pkgs); renderPackages(); showToast(); }
}

let editingPkgId = null;

function editPackage(id) {
    const pkg = getPackages().find(p => p.id === id);
    if (!pkg) return;
    editingPkgId = id;
    document.getElementById('pkg-modal-title').textContent = 'עריכת חבילה';
    fillPkgForm(pkg);
    document.getElementById('pkg-modal').classList.add('show');
    lucide.createIcons();
}

function addPackage() {
    editingPkgId = null;
    document.getElementById('pkg-modal-title').textContent = 'חבילה חדשה';
    fillPkgForm({ status:'active', name:'', price:'', dates:'', days:'', nights:'', airline:'', flightOut:'', flightIn:'', luggage:'', hotel:'Eurostars Palazzo Zichy', hotelBasis:'Deluxe Room, לינה + ארוחת בוקר', cancelDate:'', shuttle:'הסעות הלוך-חזור למשחק', note:'' });
    document.getElementById('pkg-modal').classList.add('show');
    lucide.createIcons();
}

function fillPkgForm(p) {
    document.getElementById('pkg-status').value = p.status || 'active';
    document.getElementById('pkg-name').value = p.name || '';
    document.getElementById('pkg-price').value = p.price || '';
    document.getElementById('pkg-dates').value = p.dates || '';
    document.getElementById('pkg-days').value = p.days || '';
    document.getElementById('pkg-nights').value = p.nights || '';
    document.getElementById('pkg-airline').value = p.airline || '';
    document.getElementById('pkg-flight-out').value = p.flightOut || '';
    document.getElementById('pkg-flight-in').value = p.flightIn || '';
    document.getElementById('pkg-luggage').value = p.luggage || '';
    document.getElementById('pkg-hotel').value = p.hotel || '';
    document.getElementById('pkg-hotel-basis').value = p.hotelBasis || '';
    document.getElementById('pkg-cancel-date').value = p.cancelDate || '';
    document.getElementById('pkg-shuttle').value = p.shuttle || '';
    document.getElementById('pkg-note').value = p.note || '';
}

function savePkg() {
    const pkgs = getPackages();
    const data = {
        status: document.getElementById('pkg-status').value,
        name: document.getElementById('pkg-name').value.trim(),
        price: document.getElementById('pkg-price').value.trim(),
        dates: document.getElementById('pkg-dates').value.trim(),
        days: document.getElementById('pkg-days').value.trim(),
        nights: document.getElementById('pkg-nights').value.trim(),
        airline: document.getElementById('pkg-airline').value.trim(),
        flightOut: document.getElementById('pkg-flight-out').value.trim(),
        flightIn: document.getElementById('pkg-flight-in').value.trim(),
        luggage: document.getElementById('pkg-luggage').value.trim(),
        hotel: document.getElementById('pkg-hotel').value.trim(),
        hotelBasis: document.getElementById('pkg-hotel-basis').value.trim(),
        cancelDate: document.getElementById('pkg-cancel-date').value.trim(),
        shuttle: document.getElementById('pkg-shuttle').value.trim(),
        note: document.getElementById('pkg-note').value.trim(),
    };
    if (!data.name) { alert('נא להזין שם חבילה'); return; }

    if (editingPkgId) {
        const idx = pkgs.findIndex(p => p.id === editingPkgId);
        if (idx !== -1) pkgs[idx] = { ...pkgs[idx], ...data };
    } else {
        pkgs.push({ id: 'pkg_' + Date.now(), number: pkgs.length + 1, recommended: false, ...data });
    }
    savePackages(pkgs);
    closePkgModal();
    renderPackages();
    showToast();
}

function deletePkg() {
    if (!editingPkgId || !confirm('למחוק חבילה זו לצמיתות?')) return;
    savePackages(getPackages().filter(p => p.id !== editingPkgId));
    closePkgModal();
    renderPackages();
    showToast('נמחק');
}

function closePkgModal() { document.getElementById('pkg-modal').classList.remove('show'); editingPkgId = null; }

function showToast(msg = 'נשמר בהצלחה') {
    const t = document.getElementById('save-toast');
    t.textContent = '✓ ' + msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeLeadModal(); closePkgModal(); }
});

// init
lucide.createIcons();
</script>
